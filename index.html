<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStream // Studio Pro</title>
    <style>
        /* Hyper-Clean Cyberpunk Obsidian Configuration Matrix */
        :root {
            --bg-deep: #030712;
            --surface: rgba(15, 23, 42, 0.45);
            --border-glow: rgba(56, 189, 248, 0.15);
            --cyber-blue: #0ea5e9;
            --cyber-cyan: #22d3ee;
            --cyber-green: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-deep); color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            padding: 80px 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden;
        }
        body::before {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 10%; left: 50%; transform: translateX(-50%); z-index: -1;
        }
        .main-container { width: 100%; max-width: 1100px; animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .app-header { text-align: center; margin-bottom: 50px; }
        .app-title {
            font-size: 2.75rem; font-weight: 900; letter-spacing: -0.06em;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--cyber-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
        }
        .app-subtitle { color: var(--text-secondary); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; }
        .deck-wrapper { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; align-items: start; }
        @media (max-width: 868px) {
            .deck-wrapper { grid-template-columns: 1fr; gap: 20px; }
            body { padding: 40px 15px; } .app-title { font-size: 2.25rem; }
        }
        .cyber-panel {
            background: var(--surface); border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px;
            padding: 35px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); transition: all 0.3s ease;
        }
        .cyber-panel:hover { border-color: var(--border-glow); box-shadow: 0 25px 60px rgba(14, 165, 233, 0.05); }
        .panel-header { font-size: 1rem; font-weight: 700; margin-bottom: 25px; color: var(--cyber-blue); letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .panel-header::before { content: ''; display: inline-block; width: 6px; height: 6px; background-color: var(--cyber-cyan); border-radius: 50%; box-shadow: 0 0 8px var(--cyber-cyan); }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); }
        .input-field { width: 100%; background-color: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 16px; color: var(--text-primary); font-size: 15px; outline: none; transition: all 0.2s ease; }
        .input-field:focus { border-color: var(--cyber-blue); background-color: rgba(0, 0, 0, 0.5); box-shadow: 0 0 15px rgba(14, 165, 233, 0.1); }
        .action-btn { width: 100%; background: var(--text-primary); color: var(--bg-deep); border-radius: 12px; border: none; padding: 18px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .action-btn:hover { background: var(--cyber-cyan); transform: translateY(-1px); box-shadow: 0 10px 25px rgba(34, 211, 238, 0.2); }
        .status-box { background-color: rgba(0, 0, 0, 0.4); padding: 18px; border-radius: 12px; font-family: monospace; font-size: 12px; border: 1px solid rgba(255, 255, 255, 0.03); margin-bottom: 25px; color: var(--text-secondary); line-height: 1.6; word-break: break-all; }
        .native-dl-btn {
            display: block; text-align: center; width: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            color: white !important; border-radius: 12px; padding: 18px;
            font-size: 16px; font-weight: 800; text-decoration: none;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3); transition: all 0.3s ease;
        }
        .native-dl-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 25px rgba(16, 185, 129, 0.5); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

  <body>
    <div class="main-container">
        <header class="app-header">
            <h1 class="app-title">NexStream Studio</h1>
            <p class="app-subtitle">Internal Self-Downloading Matrix</p>
        </header>
        
        <div class="deck-wrapper">
            <div class="cyber-panel">
                <div class="panel-header">System Input Terminal</div>
                <div class="input-group">
                    <label>YouTube Video / Shorts Link Target:</label>
                    <input type="text" id="target-link" class="input-field" placeholder="Paste link here...">
                </div>
                <div class="input-group">
                    <label>Output Format Profile:</label>
                    <select id="media-format" class="input-field" style="background-color: #030712;">
                        <option value="video">Full Video Package (Universal MP4)</option>
                        <option value="audio">Isolated Audio Layer (High Quality MP3)</option>
                    </select>
                </div>
                <button class="action-btn" onclick="executeInternalDownload()">🚀 FETCH DIRECT PAYLOAD</button>
            </div>
            
            <div class="cyber-panel">
                <div class="panel-header">Payload Processing Monitor</div>
                <div id="status-deck" class="status-box">
                    <span style="color: var(--text-secondary);">// Terminal state: STANDBY</span><br>Awaiting link target parameter entry inside Control Center...
                </div>
                <div id="download-port"></div>
            </div>
        </div>
    </div>

    <script>
        async function executeInternalDownload() {
            const linkInput = document.getElementById("target-link").value.trim();
            const formatInput = document.getElementById("media-format").value;
            const statusDeck = document.getElementById("status-deck");
            const downloadPort = document.getElementById("download-port");
            
            downloadPort.innerHTML = "";
            
            if (!linkInput) {
                statusDeck.style.color = "#ef4444";
                statusDeck.innerHTML = `// STATUS: CRITICAL_FAULT<br>Error: Input stream link configuration is missing.`;
                return;
            }
            
            statusDeck.style.color = "var(--cyber-cyan)";
            statusDeck.innerHTML = `// STATUS: PROCESSING_HANDSHAKE<br>Contacting isolated backend data tunnels...`;
            
            // Premium fallback endpoint arrays that support cross-origin direct stream blocks
            const apiEndpoints = [
                "https://cobalt.tools",
                "https://meowing.de"
            ];
            
            let directFileUrl = null;
            
            for (let api of apiEndpoints) {
                try {
                    let res = await fetch(api, {
                        method: "POST",
                        headers: { "Accept": "application/json", "Content-Type": "application/json" },
                        body: JSON.stringify({
                            url: linkInput,
                            downloadMode: formatInput,
                            videoQuality: "720"
                        })
                    });
                    let data = await res.json();
                    if (data.url) {
                        directFileUrl = data.url;
                        break;
                    }
                } catch (e) {
                    continue;
                }
            }
            
            if (!directFileUrl) {
                statusDeck.style.color = "#ef4444";
                statusDeck.innerHTML = `// STATUS: EXERTION_BLOCKED<br>All background routing nodes are temporarily occupied. Please pause 5 seconds and re-trigger pipeline.`;
                return;
            }
            
            statusDeck.style.color = "var(--cyber-green)";
            statusDeck.innerHTML = `// STATUS: PACKET_ISOLATED<br>Media stream found. Fetching raw bits directly into app memory...`;
            
            try {
                // 100% INTERNAL: The browser fetches the file chunks secretly behind the scenes
                const fileResponse = await fetch(directFileUrl);
                const fileBlob = await fileResponse.blob();
                
                // Converts the binary chunk into a clean local memory file url
                const localMemoryUrl = window.URL.createObjectURL(fileBlob);
                const fileExt = formatInput === "audio" ? "mp3" : "mp4";
                
                statusDeck.innerHTML = `// STATUS: SUCCESS_VERIFIED<br>Data stream fully buffered. Download container ready below!`;
                
                // Creates a completely native Save Button inside your application card deck
                downloadPort.innerHTML = `
                    <a href="${localMemoryUrl}" download="NexStream_File_${Date.now()}.${fileExt}" class="native-dl-btn">
                        📥 SAVE COMPLETED .${fileExt.toUpperCase()} TO DEVICE
                    </a>
                `;
            } catch (err) {
                // Secure automatic fallback link to secure save if device browser runs low on memory
                statusDeck.innerHTML = `// STATUS: DIRECT_BRIDGE_MOUNTED<br>Stream isolated. Click below to pull data through local network bridge.`;
                const fileExt = formatInput === "audio" ? "mp3" : "mp4";
                downloadPort.innerHTML = `
                    <a href="${directFileUrl}" target="_blank" download class="native-dl-btn">
                        📥 DOWNLOAD .${fileExt.toUpperCase()} VIA DIRECT BRIDGE
                    </a>
                `;
            }
        }
    </script>
</body>
</html>
