<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStream | Studio Pro</title>
    <style>
        :root {
            --bg-deep: #030712;
            --surface: rgba(15, 23, 42, 0.45);
            --cyber-blue: #0ea5e9;
            --cyber-cyan: #22d3ee;
            --cyber-green: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-deep); color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 40px 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .main-container { width: 100%; max-width: 1000px; }
        .app-header { text-align: center; margin-bottom: 40px; }
        .app-title {
            font-size: 2.5rem; font-weight: 800; letter-spacing: -0.05em;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--cyber-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .deck-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .deck-wrapper { grid-template-columns: 1fr; } }
        .cyber-panel {
            background: var(--surface); border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px); border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .panel-header { font-size: 0.9rem; font-weight: 700; margin-bottom: 20px; color: var(--cyber-blue); text-transform: uppercase; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-secondary); }
        .input-field { width: 100%; background-color: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 14px; color: var(--text-primary); outline: none; }
        .input-field:focus { border-color: var(--cyber-blue); }
        .action-btn { width: 100%; background: var(--text-primary); color: var(--bg-deep); border-radius: 10px; border: none; padding: 16px; font-weight: 700; cursor: pointer; }
        .action-btn:hover { background: var(--cyber-cyan); }
        .status-box { background-color: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; border: 1px solid rgba(255, 255, 255, 0.03); margin-bottom: 20px; color: var(--text-secondary); line-height: 1.5; }
        .native-dl-btn {
            display: block; text-align: center; width: 100%; background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            color: white !important; border-radius: 10px; padding: 16px; font-weight: 800; text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="app-header">
            <h1 class="app-title">NexStream Studio</h1>
        </header>
        <div class="deck-wrapper">
            <div class="cyber-panel">
                <div class="panel-header">Input Unit</div>
                <div class="input-group">
                    <label>YouTube URL / Shorts:</label>
                    <input type="text" id="target-link" class="input-field" placeholder="Paste link here...">
                </div>
                <div class="input-group">
                    <label>Format Profile:</label>
                    <select id="media-format" class="input-field" style="background-color: #030712;">
                        <option value="video">Video (MP4)</option>
                        <option value="audio">Audio (MP3)</option>
                    </select>
                </div>
                <button class="action-btn" onclick="executeInternalDownload()">🚀 EXTRACT PAYLOAD</button>
            </div>
            <div class="cyber-panel">
                <div class="panel-header">Processing Monitor</div>
                <div id="status-deck" class="status-box">// Status: STANDBY</div>
                <div id="download-port"></div>
            </div>
        </div>
    </div>
    <script>
        function parseVideoId(urlStr) {
            try {
                if (!urlStr.includes('http')) urlStr = 'https://' + urlStr;
                let url = new URL(urlStr);
                if (url.hostname.includes('youtube.com')) {
                    if (url.pathname.startsWith('/shorts/')) return url.pathname.split('/')[2];
                    return new URLSearchParams(url.search).get('v');
                }
                if (url.hostname.includes('youtu.be')) return url.pathname.substring(1);
            } catch (e) {}
            return null;
        }

        async function executeInternalDownload() {
            const linkInput = document.getElementById("target-link").value.trim();
            const formatInput = document.getElementById("media-format").value;
            const statusDeck = document.getElementById("status-deck");
            const downloadPort = document.getElementById("download-port");
            downloadPort.innerHTML = "";
            
            if (!linkInput) { statusDeck.innerHTML = "// Error: Missing link parameter."; return; }
            const videoId = parseVideoId(linkInput);
            if (!videoId) { statusDeck.innerHTML = "// Error: Invalid URL structure."; return; }
            
            statusDeck.innerHTML = "// Status: CONNECTING... Routing across regional proxy edges.";
            
            // UAE unblocked regional open federation streams
            const nodes = [
                "https://kavin.rocks",
                "https://loli.net",
                "https://piped.video"
            ];
            
            let streamUrl = null;
            for (let api of nodes) {
                try {
                    let res = await fetch(api + videoId);
                    let data = await res.json();
                    if (formatInput === "audio" && data.audioStreams?.length > 0) {
                        streamUrl = data.audioStreams[0].url; break;
                    } else if (formatInput === "video" && data.videoStreams?.length > 0) {
                        let prog = data.videoStreams.filter(s => s.videoOnly === false);
                        streamUrl = prog.length > 0 ? prog[0].url : data.videoStreams[0].url; break;
                    }
                } catch (e) {}
            }
            
            if (!streamUrl) { statusDeck.innerHTML = "// Error: Node connection congested. Retry."; return; }
            
            statusDeck.innerHTML = "// Status: SUCCESS. Container generated inside dashboard.";
            const ext = formatInput === "audio" ? "mp3" : "mp4";
            downloadPort.innerHTML = '<a href="' + streamUrl + '" target="_blank" rel="noopener noreferrer" class="native-dl-btn">📥 SAVE .' + ext.toUpperCase() + ' TO DEVICE</a>';
        }
    </script>
</body>
</html>
