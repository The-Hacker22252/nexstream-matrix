<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStream // Spotify Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <header class="app-header">
            <h1 class="app-title">NexStream // Spotify Library</h1>
        </header>
        
        <div class="cyber-panel">
            <div class="panel-header">🛰️ Global Search Database Core</div>
            <div class="search-wrapper">
                <input type="text" id="search-query" class="input-field" placeholder="Search track title, artist name, or album album...">
                <button class="action-btn" onclick="executeLibrarySearch()">🚀 SEARCH</button>
            </div>
            <div id="status-deck" class="status-box" style="margin-top: 15px;">// System status: STANDBY. Enter keyword queries above.</div>
        </div>

        <div class="cyber-panel" id="results-panel" style="display: none;">
            <div class="panel-header">📊 Matching Payload Tracks Matrix</div>
            <div id="results-deck" class="results-container"></div>
        </div>
    </div>

    <script>
        async function executeLibrarySearch() {
            const queryInput = document.getElementById("search-query").value.trim();
            const statusDeck = document.getElementById("status-deck");
            const resultsPanel = document.getElementById("results-panel");
            const resultsDeck = document.getElementById("results-deck");
            
            resultsDeck.innerHTML = "";
            resultsPanel.style.display = "none";
            
            if (!queryInput) {
                statusDeck.style.color = "#ef4444";
                statusDeck.innerHTML = "// Error: Search string query parameters are empty.";
                return;
            }
            
            statusDeck.style.color = "var(--cyber-cyan)";
            statusDeck.innerHTML = "// STATUS: CONNECTING<br>Querying unblocked cloud audio delivery arrays...";
            
            try {
                // Direct access node to Spotify library open database indices 
                const searchNode = "https://spotifydown.com" + encodeURIComponent(queryInput);
                let response = await fetch(searchNode, {
                    headers: { 'Origin': 'https://spotifydown.com', 'Referer': 'https://spotifydown.com' }
                });
                let payload = await response.json();
                
                if (payload.success && payload.data && payload.data.length > 0) {
                    statusDeck.style.color = "var(--spotify-green)";
                    statusDeck.innerHTML = `// STATUS: SUCCESS<br>Found ${payload.data.length} matching library payloads. Render complete.`;
                    resultsPanel.style.display = "block";
                    
                    payload.data.forEach(track => {
                        // Extract cover art resolution elements safely
                        let coverImg = track.id && track.id.length > 0 ? "https://scdn.co" + track.id : "https://spotifyexplained.com";
                        if (track.cover && track.cover.url) coverImg = track.cover.url;
                        if (track.album && track.album.cover) coverImg = track.album.cover;
                        
                        const trackCardHtml = `
                            <div class="track-card">
                                <div class="track-info-block">
                                    <img src="${coverImg}" class="album-art" alt="Cover">
                                    <div class="meta-details">
                                        <span class="track-title">${track.name}</span>
                                        <span class="track-artist">${track.artists || track.artist || 'Unknown Artist'}</span>
                                    </div>
                                </div>
                                <button class="dl-icon-btn" onclick="initializeTrackExtraction('${track.link}', this)">📥 DOWNLOAD</button>
                            </div>
                        `;
                        resultsDeck.insertAdjacentHTML('beforeend', trackCardHtml);
                    });
                } else {
                    statusDeck.style.color = "#ef4444";
                    statusDeck.innerHTML = "// STATUS: EMPTY_SET<br>No matching songs found inside database index lines. Check keyword spelling anomalies.";
                }
            } catch (err) {
                statusDeck.style.color = "#ef4444";
                statusDeck.innerHTML = "// STATUS: TIMEOUT_FAULT<br>Background network connection timed out inside regional UAE filters. Click Search again.";
            }
        }

        async function initializeTrackExtraction(spotifyLink, buttonElement) {
            const statusDeck = document.getElementById("status-deck");
            const originalButtonText = buttonElement.innerHTML;
            
            buttonElement.disabled = true;
            buttonElement.innerHTML = "⏳ ISOLATING...";
            statusDeck.style.color = "var(--cyber-cyan)";
            statusDeck.innerHTML = "// STATUS: EXTRACTING<br>Decrypting track metrics... loading raw binary stream hooks...";
            
            try {
                let trackId = spotifyLink.split("track/")[1].split("?")[0];
                const songDownloadNode = "https://spotifydown.com" + trackId;
                
                let res = await fetch(songDownloadNode, {
                    headers: { 'Origin': 'https://spotifydown.com', 'Referer': 'https://spotifydown.com' }
                });
                let payload = await res.json();
                
                if (payload.success && payload.link) {
                    statusDeck.style.color = "var(--spotify-green)";
                    statusDeck.innerHTML = `// STATUS: COMPLETED<br>Successfully verified download stream: "${payload.metadata.title}"`;
                    
                    // Transform the active clicked search element button into a direct file save port instantly inside app context!
                    buttonElement.innerHTML = "📥 SAVE MP3";
                    buttonElement.onclick = function() {
                        window.open(payload.link, '_blank');
                    };
                    buttonElement.disabled = false;
                    buttonElement.style.background = "var(--spotify-green)";
                    buttonElement.style.color = "white";
                } else {
                    buttonElement.innerHTML = "❌ FAILED";
                    statusDeck.style.color = "#ef4444";
                    statusDeck.innerHTML = `// STATUS: BLOCKED<br>Regional firewall endpoint collision inside extraction arrays. Try a different track.`;
                    setTimeout(() => { buttonElement.innerHTML = originalButtonText; buttonElement.disabled = false; }, 3000);
                }
            } catch (e) {
                buttonElement.innerHTML = "❌ TIMEOUT";
                statusDeck.style.color = "#ef4444";
                statusDeck.innerHTML = "// STATUS: SYSTEM_EXCEPTION<br>Core routing failure. Click Download button again to recycle connection loops.";
                setTimeout(() => { buttonElement.innerHTML = originalButtonText; buttonElement.disabled = false; }, 3000);
            }
        }
    </script>
</body>
</html>
