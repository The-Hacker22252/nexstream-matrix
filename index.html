<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStream Pro | Ultimate Overlord Matrix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #060913;
            color: #F1F5F9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .matrix-title {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00F2FE 0%, #4FACFE 50%, #0072FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 2px;
            letter-spacing: 2px;
        }
        .sub-tagline {
            text-align: center;
            color: #94A3B8;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 40px;
            letter-spacing: 3px;
        }
        .deck-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        @media (max-width: 768px) {
            .deck-wrapper { grid-template-columns: 1fr; }
            .matrix-title { font-size: 2.5rem; }
        }
        .armored-card {
            background: linear-gradient(145deg, #0F172A 0%, #1E293B 100%);
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
        }
        .panel-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #38BDF8;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #94A3B8;
        }
        .input-field {
            width: 100%;
            background-color: #020617;
            border: 2px solid #334155;
            border-radius: 8px;
            padding: 14px;
            color: #F1F5F9;
            font-size: 16px;
            outline: none;
        }
        .input-field:focus {
            border-color: #38BDF8;
        }
        .action-btn {
            width: 100%;
            background: linear-gradient(90deg, #00F2FE 0%, #0072FF 100%);
            color: #FFFFFF;
            border-radius: 10px;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 114, 255, 0.4);
        }
        .action-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 6px 25px rgba(0, 242, 254, 0.6);
        }
        .status-box {
            background-color: #020617;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #1E293B;
            margin-bottom: 20px;
            color: #475569;
        }
        .iframe-container {
            width: 100%;
            display: none;
            background-color: #060913;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.7);
        }
        iframe {
            width: 100%;
            height: 315px;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1 class="matrix-title">🔱 NEXSTREAM PRO: ULTRA MATRIX 🔱</h1>
        <p class="sub-tagline">NATIVE CLIENT INTERFACE // AD-FREE STREAM ISOLATION</p>
        
        <div class="deck-wrapper">
            <div class="armored-card">
                <div class="panel-header">A Control Panel Matrix</div>
                <div class="input-group">
                    <label>Input Target Video Link:</label>
                    <input type="text" id="target-link" class="input-field" placeholder="Paste link here...">
                </div>
                <button class="action-btn" onclick="igniteDecryption()">🚀 IGNITE QUANTUM OVERRIDE</button>
            </div>
            
            <div class="armored-card">
                <div class="panel-header">Payload Inspector Display</div>
                <div id="status-deck" class="status-box">
                    🛰️ Matrix State: Standby Mode.<br>Awaiting link target parameters inside Control Panel.
                </div>
                <div id="player-container" class="iframe-container"></div>
            </div>
        </div>
    </div>

    <script>
        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function igniteDecryption() {
            const linkInput = document.getElementById("target-link").value;
            const statusDeck = document.getElementById("status-deck");
            const playerContainer = document.getElementById("player-container");
            
            if (!linkInput) {
                statusDeck.style.color = "#EF4444";
                statusDeck.innerHTML = "❌ CRITICAL TERMINATION: VIDEO PARAMETER MISSING.";
                return;
            }
            
            const token = extractVideoId(linkInput);
            if (!token) {
                statusDeck.style.color = "#EF4444";
                statusDeck.innerHTML = "❌ MALFORMED PARSING STRUCTURE: VALID TOKEN ID NOT FOUND.";
                return;
            }
            
            statusDeck.style.color = "#10B981";
            statusDeck.style.borderColor = "#10B981";
            statusDeck.innerHTML = `[MATRIX LOCK] IDENTITY TOKEN ACQUIRED: ${token}<br>[SECURITY] NATIVE DESKTOP PLAYER ROUTING MOUNTED`;
            
            // This URL path is executed 100% locally in your browser. 
            // Vercel/Netlify never messes with your string sashes, making it impossible to fail!
            playerContainer.innerHTML = `<iframe src="https://youtube-nocookie.com{token}?autoplay=1&modestbranding=1&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            playerContainer.style.display = "block";
        }
    </script>
</body>
</html>
