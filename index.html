<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStream // Spotify Studio</title>
    <style>
        /* Hyper-Clean Cyberpunk Obsidian Configuration Matrix */
        :root {
            --bg-deep: #030712;
            --surface: rgba(15, 23, 42, 0.45);
            --border-glow: rgba(29, 185, 84, 0.2);
            --spotify-green: #1db954;
            --cyber-cyan: #22d3ee;
            --text-primary: #f8fafc;
            --text-secondary: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-deep); color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 80px 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden;
        }
        body::before {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(29, 185, 84, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 10%; left: 50%; transform: translateX(-50%); z-index: -1;
        }
        .main-container { width: 100%; max-width: 1000px; }
        .app-header { text-align: center; margin-bottom: 40px; }
        .app-title {
            font-size: 2.5rem; font-weight: 800; letter-spacing: -0.05em;
            background: linear-gradient(135deg, var(--text-primary) 40%, var(--spotify-green) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .deck-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .deck-wrapper { grid-template-columns: 1fr; } }
        .cyber-panel {
            background: var(--surface); border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .cyber-panel:hover { border-color: var(--border-glow); }
        .panel-header { font-size: 0.9rem; font-weight: 700; margin-bottom: 20px; color: var(--spotify-green); text-transform: uppercase; letter-spacing: 0.05em; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-secondary); }
        .input-field { width: 100%; background-color: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 14px; color: var(--text-primary); outline: none; }
        .input-field:focus { border-color: var(--spotify-green); }
        .action-btn { width: 100%; background: var(--text-primary); color: var(--bg-deep); border-radius: 10px; border: none; padding: 16px; font-weight: 700; cursor: pointer; }
        .action-btn:hover { background: var(--spotify-green); color: white; }
        .status-box { background-color: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; border: 1px solid rgba(255, 255, 255, 0.03); margin-bottom: 20px; color: var(--text-secondary); line-height: 1.5; word-break: break-all; }
        .native-dl-btn {
            display: block; text-align: center; width: 100%; background: linear-gradient(90deg, #1db954 0%, #191414 100%);
            color: white !important; border-radius: 10px; padding: 16px; font-weight: 800; text-decoration: none;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="app-header">
            <h1 class="app-title">NexStream // Spotify Studio</h1>
        </header>
        <div class="deck-wrapper">
            <div class="cyber-panel">
                <div class="panel-header">Input Terminal</div>
                <div class="input-group">
                    <label>Spotify Track / Playlist URL:</label>
                    <input type="text" id="target-link" class="input-field" placeholder="Paste ://spotify.com link here...">
                </div>
                <button class="action-btn" onclick="executeSpotifyDownload()">🚀 EXTRACT AUDIO PAYLOAD</button>
            </div>
            <div class="cyber-panel">
                <div class="panel-header">Processing Monitor</div>
                <div id="status-deck" class="status-box">// Status: STANDBY</div>
                <div id="download-port"></div>
            </div>
        </div>
    </div>
    <script>
        async function executeSpotifyDownload() {
            const linkInput = document.getElementById("target-link").value.trim();
            const statusDeck = document.getElementById("status-deck");
            const downloadPort = document.getElementById("download-port");
            downloadPort.innerHTML = "";
            
            if (!linkInput) { statusDeck.innerHTML = "// Error: Missing Spotify link parameter."; return; }
            if (!linkInput.includes("spotify.com")) { statusDeck.innerHTML = "// Error: Invalid syntax. Provide an ://spotify.com URL."; return; }
            
            statusDeck.style.color = "var(--cyber-cyan)";
            statusDeck.innerHTML = "// STATUS: CONNECTING<br>Querying unblocked client metadata tunnels...";
            
            // Ultra-strong, ad-free API pipeline optimized for cross-origin Spotify extractions
            const apiEndpoints = [
                "https://cobalt.tools",
                "https://meowing.de"
            ];
            
            let directMp3Url = null;
            
            for (let api of apiEndpoints) {
                try {
                    let res = await fetch(api, {
                        method: "POST",
                        headers: { "Accept": "application/json", "Content-Type": "application/json" },
                        body: JSON.stringify({
                            url: linkInput,
                            downloadMode: "audio",
                            audioFormat: "mp3"
                        })
                    });
                    let data = await res.json();
                    if (data.url) {
                        directMp3Url = data.url;
                        break;
                    }
                } catch (e) {
                    continue;
                }
            }
            
            if (!directMp3Url) {
                statusDeck.style.color = "#ef4444";
                statusDeck.innerHTML = "// STATUS: CONGESTION_LIMIT<br>Traffic limits hit on metadata nodes. Click Extract Audio Payload again to re-route connection.";
                return;
            }
            
            statusDeck.style.color = "var(--spotify-green)";
            statusDeck.innerHTML = "// STATUS: AUDIO_ISOLATED<br>Track extracted successfully! Clean download ready inside app context.";
            
            // Renders the high-quality MP3 save bar directly inside your obsidian panel card layout
            downloadPort.innerHTML = '<a href="' + directMp3Url + '" target="_blank" rel="noopener noreferrer" class="native-dl-btn">📥 SAVE COMPLETED .MP3 TO DEVICE</a>';
        }
    </script>
</body>
</html>
